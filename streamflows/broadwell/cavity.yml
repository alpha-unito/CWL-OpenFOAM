#!/usr/bin/env streamflow
version: v1.0

workflows:
  cavity-pipeline:
    type: cwl
    config:
      file: ../../workflows/cavity-pipeline.cwl
      settings: ../../jobs/job_cavity.yml
    bindings:
      - step: /copy_case
        target:
          deployment: local

      - step: /blockMesh
        target:
          deployment: broadwell
          service: sequential

      - step: /icoFoam
        target:
          deployment: broadwell
          service: sequential


deployments:
  local: 
    type: local
    config: {}
    workdir: ../../workdir-broadwell
  broadwell:
    type: slurm
    config:
      maxConcurrentJobs: 1
      services:
        sequential:
          partition: broadwell
          nodes: "1"
          ntasksPerNode: 1
          file: ../../facilities/broadwell-facility.sh

        parallel:
          partition: broadwell
          nodes: "1"
          ntasksPerNode: 1
          file: ../../facilities/broadwell-facility.sh
    workdir: ../../workdir-broadwell