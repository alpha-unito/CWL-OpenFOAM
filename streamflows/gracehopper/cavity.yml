#!/usr/bin/env streamflow
version: v1.0

workflows:
  cavity-pipeline:
    type: cwl
    config:
      file: ../workflows/cavity-pipeline.cwl
      settings: ../jobs/job_cavity.yml
    bindings:
      - step: /copy_case
        target:
          deployment: local

      - step: /blockMesh
        target:
          deployment: gracehopper
          service: sequential

      - step: /icoFoam
        target:
          deployment: gracehopper
          service: sequential

deployments:
  local: 
    type: local
    config: {}
    workdir: ../../workdir-gracehopper
  gracehopper:
    type: slurm
    config:
      maxConcurrentJobs: 1
      services:
        sequential:
          partition: gracehopper
          nodes: "1"
          file: ../../facilities/gracehopper-facility.sh

        parallel:
          partition: gracehopper
          nodes: "2"
          file: ../../facilities/gracehopper-facility.sh
    workdir: ../../workdir-gracehopper

